<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Calculator - Kevin Meldau</title>
    <meta name="description" content="Calculator" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <div class="calculator-grid">
      <div class="output">
        <div class="previous-operand">123&plus;</div>
        <div class="current-operand">456</div>
      </div>
      <button class="span-two">AC</button>
      <button>DEL</button>
      <button class="operand-light">&divide;</button>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operand-light">&times;</button>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operand-light">&plus;</button>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operand-light">&minus;</button>
      <button>.</button>
      <button>0</button>
      <button class="span-two operand-drk">&equals;</button>
    </div>
  </body>
</html>
