<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Calculator - Kevin Meldau</title>
    <meta name="description" content="Calculator" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <div class="calculator-grid">
      <div class="output">
        <div class="previous-operand" data-previous-operand></div>
        <div class="current-operand" data-current-operand></div>
      </div>
      <button class="span-two" data-all-clear>AC</button>
      <button data-delete>DEL</button>
      <button class="operand-light" data-operation>&divide;</button>
      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button class="operand-light" data-operation>&times;</button>
      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button class="operand-light" data-operation>&plus;</button>
      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button class="operand-light" data-operation>&minus;</button>
      <button data-number>.</button>
      <button data-number>0</button>
      <button class="span-two operand-drk" data-equals>&equals;</button>
    </div>
  </body>
</html>
